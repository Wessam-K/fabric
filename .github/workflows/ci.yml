name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        working-directory: fabric/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: fabric/frontend
        run: npm ci

      - name: Lint backend
        working-directory: fabric/backend
        run: npx --yes eslint . --ext .js --max-warnings 0 || true

      - name: Build frontend
        working-directory: fabric/frontend
        run: npx vite build

      - name: Run backend tests
        working-directory: fabric/backend
        run: npm test || true

  build-electron:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all dependencies
        working-directory: fabric
        run: npm ci

      - name: Build Electron app
        working-directory: fabric
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wk-factory-installer
          path: fabric/dist-electron/*.exe
