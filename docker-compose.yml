# Docker Compose for WK-Factory
version: '3.8'

services:
  wk-factory:
    build: .
    container_name: wk-factory
    expose:
      - "9002"
    volumes:
      - wk-data:/data
    environment:
      - NODE_ENV=production
      - PORT=9002
      - WK_DB_DIR=/data
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://localhost}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9002/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: wk-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      wk-factory:
        condition: service_healthy
    restart: unless-stopped

volumes:
  wk-data:
    driver: local
